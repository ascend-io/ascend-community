name: ottos-expeditions-bigquery

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"
  pull_request:
    types: [opened, reopened, synchronize, labeled]
    paths:
      - "ottos-expeditions/**"
      - ".github/actions/ottos-expeditions/**"
      - ".github/workflows/ottos-expeditions-bigquery.yaml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  bigquery:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ottos-expeditions
    steps:
      # common setup
      - uses: ./.github/workflows/ottos-expeditions

      # run bigquery test
      - run: just test-bigquery
