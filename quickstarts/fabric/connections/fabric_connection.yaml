connection:
  fabric:
    # server string from Fabric warehouse
    # like 'xxx-yyy.datawarehouse.fabric.microsoft.com'
    host: <your-host>
    # warehouse name
    database: ascend_data_plane_warehouse
    # schema name
    schema: quickstart
    service_principal:
      # client_id is the same as appId in various places in Azure
      client_id: <your-client-id>
      # client_secret is the same as password in various places in Azure
      # set the client secret in the environment vault
      client_secret: ${vaults.environment.<your-secret-name>}
      # tenant_id is sometimes tenant or directory id in Azure
      tenant_id: <your-tenant-id>
    driver: 'ODBC Driver 18 for SQL Server'
    create_schema_if_not_exists: True
    staging_abfs:
      account: <your-storage-account-name>
      # change to your storage container if you used a different one
      root: "abfss://ascend-staging"
      # set the storage account key in the environment vault
      shared_key: ${vaults.environment.<your-secret-name>}

