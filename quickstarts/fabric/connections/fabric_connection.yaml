connection:
  fabric:
    host: ${parameters.fabric_warehouse_server}
    database: ${parameters.fabric_warehouse_name}
    schema: ${parameters.fabric_warehouse_schema}
    service_principal:
      client_id: ${parameters.client_id}
      client_secret: ${vaults.environment.<your-secret-name>}
      tenant_id: ${parameters.tenant_id}
    driver: 'ODBC Driver 18 for SQL Server'
    create_schema_if_not_exists: True
    staging_abfs:
      account: ${parameters.storage_account_name}
      # change to your storage container if you used a different one
      root: ${parameters.storage_account_path}
      # set the storage account key in the environment vault
      shared_key: ${vaults.environment.<your-secret-name>}
